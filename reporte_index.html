<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILTEC - Reporte Industrial</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #1e272e; --accent: #0be881; --bg: #f1f2f6; --border: #ced4da; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; font-size: 13px; }
        .contenedor { max-width: 800px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .header img { max-height: 40px; }
        .seccion { padding: 20px; display: none; }
        .activo { display: block; animation: fadeIn 0.4s; }
        h3 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; color: var(--primary); margin-top: 0; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-weight: bold; font-size: 0.75rem; color: #444; display: block; margin-bottom: 2px; }
        
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        textarea { resize: vertical; min-height: 60px; }
        
        /* Estilo para Tablas de 6 filas */
        .tabla-reporte { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.7rem; }
        .tabla-reporte th { background: #f8f9fa; border: 1px solid var(--border); padding: 5px; text-align: center; }
        .tabla-reporte td { border: 1px solid var(--border); padding: 2px; }
        .tabla-reporte input, .tabla-reporte select { border: none; padding: 4px; font-size: 0.7rem; }

        /* Calidad e Inspección */
        .caja-calidad { background: #e3f2fd; padding: 12px; border-radius: 5px; border: 1px solid #90caf9; margin: 15px 0; }
        .inspeccion-item { display: grid; grid-template-columns: 1fr 120px; align-items: center; padding: 4px 0; border-bottom: 1px solid #bbdefb; }
        .checks { display: flex; gap: 10px; }
        .checks label { display: flex; align-items: center; gap: 3px; font-size: 0.7rem; cursor: pointer; }
        input[type="checkbox"] { width: auto; }

        /* Registro de Paros */
        .seccion-paros { background: #fff8e1; padding: 10px; border-radius: 5px; border: 1px solid #ffe082; margin: 10px 0; }
        .paro-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 5px; margin-bottom: 5px; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; text-decoration: none; color: white; }
        .btn-wa { background: #25D366; }
        .btn-plano { background: #3498db; }
        .info-previa { background: #e9ecef; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 0.85rem; border-left: 4px solid var(--accent); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="header">
        <img src="https://wal-35.github.io/orden_produccion/logoiltec.png" alt="ILTEC">
        <div><strong>REPORTE DIARIO</strong></div>
    </div>

    <div class="seccion activo" id="p1">
        <h3>1. Datos de Programación</h3>
        <label>Pieza / Item:</label><input type="text" id="i_item" placeholder="Ref de la pieza">
        <label>Plano (Link):</label><input type="url" id="i_plano" placeholder="URL de GitHub">
        <div class="grid">
            <div><label>Cantidad a Fabricar:</label><input type="number" id="i_cant"></div>
            <div>
                <label>Tipo de Material:</label>
                <select id="i_mat">
                    <option value="CR">Cold Rolled</option>
                    <option value="HR">Hot Rolled</option>
                    <option value="GALV">Galvanizado</option>
                </select>
            </div>
        </div>
        <button class="btn btn-wa" onclick="enviarP1()">Siguiente: Alistador <i class="material-icons">arrow_forward</i></button>
    </div>

    <div class="seccion" id="p3">
        <h3>3. Sección de Punzonado</h3>
        <div id="info_p3" class="info-previa"></div>
        
        <div class="grid">
            <div><label>Operario:</label><select id="pu_op"><option>Operario 1</option><option>Operario 2</option></select></div>
            <div><label>Máquina:</label><input type="text" id="pu_mq" readonly></div>
        </div>

        <table class="tabla-reporte" id="tabla_punzonado">
            <thead>
                <tr>
                    <th>Lámina/Retal</th>
                    <th>Medidas Retal</th>
                    <th>Cant. Sobrante</th>
                    <th>Material</th>
                    <th>Calibre</th>
                </tr>
            </thead>
            <tbody id="filas_pu">
                </tbody>
        </table>

        <div class="grid">
            <div><label>Producto Conforme (Cant):</label><input type="number" id="pu_conf"></div>
            <div><label>No Conforme (Cant):</label><input type="number" id="pu_nconf"></div>
        </div>

        <div class="caja-calidad">
            <label>INSPECCIÓN DE CALIDAD:</label>
            <div class="inspeccion-item"><span>Medidas</span><div class="checks"><label><input type="checkbox" id="pu_c_med"> C</label><label><input type="checkbox" id="pu_nc_med"> NC</label></div></div>
            <div class="inspeccion-item"><span>Material</span><div class="checks"><label><input type="checkbox" id="pu_c_mat"> C</label><label><input type="checkbox" id="pu_nc_mat"> NC</label></div></div>
            <div class="inspeccion-item"><span>Calibre</span><div class="checks"><label><input type="checkbox" id="pu_c_cal"> C</label><label><input type="checkbox" id="pu_nc_cal"> NC</label></div></div>
        </div>

        <div class="seccion-paros">
            <label>REGISTRO DE PAROS (Máx 3):</label>
            <div class="paro-row"><strong>Motivo</strong><strong>Inicio</strong><strong>Fin</strong></div>
            <div class="paro-row"><input type="text" id="pu_m1" placeholder="Paro 1"><input type="time" id="pu_i1"><input type="time" id="pu_f1"></div>
            <div class="paro-row"><input type="text" id="pu_m2" placeholder="Paro 2"><input type="time" id="pu_i2"><input type="time" id="pu_f2"></div>
            <div class="paro-row"><input type="text" id="pu_m3" placeholder="Paro 3"><input type="time" id="pu_i3"><input type="time" id="pu_f3"></div>
        </div>

        <label>Observaciones:</label>
        <textarea id="pu_obs"></textarea>
        
        <button class="btn btn-wa" onclick="enviarP3()">Enviar a Plegado <i class="material-icons">send</i></button>
    </div>

    <div class="seccion" id="p4">
        <h3>4. Sección de Plegado</h3>
        <div id="info_p4" class="info-previa"></div>

        <div class="grid">
            <div><label>Doblador:</label><select id="pl_op"><option>Doblador 1</option><option>Doblador 2</option></select></div>
            <div><label>Máquina:</label><select id="pl_mq"><option>Durma CNC</option><option>Plegadora 2</option></select></div>
        </div>

        <table class="tabla-reporte">
            <thead>
                <tr>
                    <th>Lámina/Retal</th>
                    <th>Medidas Retal</th>
                    <th>Cant. Sobrante</th>
                    <th>Material</th>
                    <th>Calibre</th>
                </tr>
            </thead>
            <tbody id="filas_pl"></tbody>
        </table>

        <div class="grid">
            <div><label>Producto Conforme (Cant):</label><input type="number" id="pl_conf"></div>
            <div><label>No Conforme (Cant):</label><input type="number" id="pl_nconf"></div>
        </div>

        <div class="caja-calidad">
            <label>INSPECCIÓN DE CALIDAD:</label>
            <div class="inspeccion-item"><span>Medidas</span><div class="checks"><label><input type="checkbox" id="pl_c_med"> C</label><label><input type="checkbox" id="pl_nc_med"> NC</label></div></div>
            <div class="inspeccion-item"><span>Material</span><div class="checks"><label><input type="checkbox" id="pl_c_mat"> C</label><label><input type="checkbox" id="pl_nc_mat"> NC</label></div></div>
            <div class="inspeccion-item"><span>Calibre</span><div class="checks"><label><input type="checkbox" id="pl_c_cal"> C</label><label><input type="checkbox" id="pl_nc_cal"> NC</label></div></div>
        </div>

        <div class="seccion-paros">
            <label>REGISTRO DE PAROS:</label>
            <div class="paro-row"><input type="text" id="pl_m1" placeholder="Paro 1"><input type="time" id="pl_i1"><input type="time" id="pl_f1"></div>
            <div class="paro-row"><input type="text" id="pl_m2" placeholder="Paro 2"><input type="time" id="pl_i2"><input type="time" id="pl_f2"></div>
            <div class="paro-row"><input type="text" id="pl_m3" placeholder="Paro 3"><input type="time" id="pl_i3"><input type="time" id="pl_f3"></div>
        </div>

        <label>Observaciones:</label>
        <textarea id="pl_obs"></textarea>

        <button class="btn btn-wa" onclick="enviarP4()">FINALIZAR REPORTE <i class="material-icons">done_all</i></button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const materialOptions = `<option value="CR">CR</option><option value="HR">HR</option><option value="GALV">GALV</option>`;
    const calibreOptions = `<option value="12">12</option><option value="14">14</option><option value="16">16</option><option value="18">18</option><option value="20">20</option><option value="22">22</option>`;

    // Generar las 6 filas para las tablas
    function generarFilas(idContenedor, prefijo) {
        const tbody = document.getElementById(idContenedor);
        for (let i = 1; i <= 6; i++) {
            tbody.innerHTML += `
                <tr>
                    <td><input type="text" id="${prefijo}_lr_${i}"></td>
                    <td><input type="text" id="${prefijo}_mr_${i}"></td>
                    <td><input type="number" id="${prefijo}_cs_${i}"></td>
                    <td><select id="${prefijo}_mat_${i}">${materialOptions}</select></td>
                    <td><select id="${prefijo}_cal_${i}">${calibreOptions}</select></td>
                </tr>`;
        }
    }

    window.onload = function() {
        generarFilas('filas_pu', 'pu');
        generarFilas('filas_pl', 'pl');
        
        const step = params.get('step') || '1';
        if(step === '1') document.getElementById('p1').classList.add('activo');
        if(step === '3') {
            document.getElementById('p3').classList.add('activo');
            document.getElementById('info_p3').innerHTML = `<strong>Item:</strong> ${params.get('i')} | <strong>Cant:</strong> ${params.get('c')}`;
            document.getElementById('pu_mq').value = params.get('mq');
        }
        if(step === '4') {
            document.getElementById('p4').classList.add('activo');
            document.getElementById('info_p4').innerHTML = `<strong>Item:</strong> ${params.get('i')} | Punzonado Finalizado`;
        }
    }

    function enviarP1() {
        const i = document.getElementById('i_item').value;
        const c = document.getElementById('i_cant').value;
        const p = document.getElementById('i_plano').value;
        if(!i) return alert("Falta Item");
        // Salto directo a simular preparador para brevedad
        let url = `${window.location.href.split('?')[0]}?step=3&i=${encodeURIComponent(i)}&c=${c}&mq=PUNZONADORA_DURMA&p=${encodeURIComponent(p)}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(`*NUEVA ORDEN ILTEC*\nItem: ${i}\nLink: ${url}`)}`);
    }

    function enviarP3() {
        let url = `${window.location.href.split('?')[0]}?step=4&i=${params.get('i')}&p=${encodeURIComponent(params.get('p'))}`;
        // Aquí se sumariarían datos importantes para el siguiente paso
        const msg = `✅ *PUNZONADO OK*\nItem: ${params.get('i')}\nConf: ${document.getElementById('pu_conf').value}\nSigue Plegado: ${url}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function enviarP4() {
        const msg = `📊 *REPORTE FINAL ILTEC* 📊
*ITEM:* ${params.get('i')}

🔨 *PUNZONADO:*
Conforme: ${document.getElementById('pu_conf').value}
No Conforme: ${document.getElementById('pu_nconf').value}
Obs: ${document.getElementById('pu_obs').value}

📐 *PLEGADO:*
Conforme: ${document.getElementById('pl_conf').value}
No Conforme: ${document.getElementById('pl_nconf').value}
Obs: ${document.getElementById('pl_obs').value}

_Reporte generado digitalmente._`;

        window.open(`https://wa.me/573182150158?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
