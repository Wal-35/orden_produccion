<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILTEC - Reporte Corto</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #d1d8e0; margin: 0; padding: 10px; }
        .contenedor { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .header img { max-height: 40px; }
        .seccion { padding: 20px; display: none; }
        .activo { display: block; animation: fadeIn 0.3s; }
        h3 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; color: var(--primary); font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: 1 / -1; }
        label { font-weight: bold; font-size: 0.75rem; color: #666; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-top: 3px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; text-decoration: none; }
        .btn-wa { background: #25D366; color: white; }
        .btn-plano { background: #3182ce; color: white; font-size: 0.8rem; margin-bottom: 10px; }
        .resumen-tiempo { background: #eefaf3; padding: 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; margin-top: 5px; text-align: center; border: 1px solid #c6f6d5; }
        .tabla-mini { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin-top: 10px; }
        .tabla-mini th, .tabla-mini td { border: 1px solid #eee; padding: 3px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="header">
        <img src="https://wal-35.github.io/orden_produccion/logoiltec.png" alt="ILTEC">
        <div style="text-align:right; font-size: 0.8rem;"><strong>PRODUCCIÓN</strong></div>
    </div>

    <div class="seccion activo" id="s1">
        <h3><i class="material-icons">style</i> Datos Iniciales</h3>
        <label>Pieza / Item:</label><input type="text" id="i">
        <label>Plano (Link GitHub):</label><input type="url" id="p">
        <div class="grid">
            <div><label>Cant:</label><input type="number" id="c"></div>
            <div><label>Calibre:</label><input type="text" id="m"></div>
        </div>
        <button class="btn btn-wa" onclick="env1()"><i class="material-icons">send</i> Enviar a Punzonado</button>
    </div>

    <div class="seccion" id="s2">
        <h3><i class="material-icons">settings_suggest</i> Punzonado</h3>
        <a href="#" id="lp2" class="btn btn-plano" target="_blank"><i class="material-icons">map</i> VER PLANO</a>
        <label>Operario:</label><input type="text" id="op2">
        <div class="grid">
            <div><label>Inicio:</label><input type="time" id="t2i" onchange="calc(2)"></div>
            <div><label>Fin:</label><input type="time" id="t2f" onchange="calc(2)"></div>
        </div>
        <div class="resumen-tiempo" id="r2">Tiempo: 0 min</div>
        
        <label style="margin-top:10px; display:block">Motivo de Paro y Minutos:</label>
        <div class="grid">
            <select id="pc1">
                <option value="0">Sin Paros</option>
                <option value="MNT">Mantenimiento</option>
                <option value="HER">Cambio de Herramientas</option>
                <option value="MAT">Falta de Material</option>
                <option value="PLA">Espera de Planos</option>
                <option value="CAL">Inspección de Calidad</option>
                <option value="OTR">Otro (Ver Notas)</option>
            </select>
            <input type="number" id="pm1" placeholder="Minutos">
        </div>

        <button class="btn btn-wa" onclick="env2()"><i class="material-icons">arrow_forward</i> Enviar a Plegado</button>
    </div>

    <div class="seccion" id="s3">
        <h3><i class="material-icons">architecture</i> Plegado</h3>
        <a href="#" id="lp3" class="btn btn-plano" target="_blank"><i class="material-icons">map</i> VER PLANO</a>
        <label>Doblador:</label><input type="text" id="op3">
        <div class="grid">
            <div><label>Inicio:</label><input type="time" id="t3i" onchange="calc(3)"></div>
            <div><label>Fin:</label><input type="time" id="t3f" onchange="calc(3)"></div>
        </div>
        <div class="resumen-tiempo" id="r3">Tiempo: 0 min</div>

        <label style="margin-top:10px; display:block">Motivo de Paro y Minutos:</label>
        <div class="grid">
            <select id="pc2">
                <option value="0">Sin Paros</option>
                <option value="MNT">Mantenimiento</option>
                <option value="HER">Cambio de Herramientas</option>
                <option value="MAT">Falta de Material</option>
                <option value="PLA">Espera de Planos</option>
                <option value="CAL">Inspección de Calidad</option>
                <option value="OTR">Otro (Ver Notas)</option>
            </select>
            <input type="number" id="pm2" placeholder="Minutos">
        </div>

        <button class="btn btn-wa" onclick="env3()"><i class="material-icons">check_circle</i> Finalizar Reporte</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const getLinkLimpio = () => window.location.href.split('?')[0];

    window.onload = function() {
        if(params.has('i')) {
            document.getElementById('s1').classList.remove('activo');
            if(!params.has('ok')) {
                document.getElementById('s2').classList.add('activo');
                document.getElementById('lp2').href = params.get('p');
            } else {
                document.getElementById('s3').classList.add('activo');
                document.getElementById('lp3').href = params.get('p');
            }
        }
    }

    function calc(n) {
        const i = document.getElementById(`t${n}i`).value;
        const f = document.getElementById(`t${n}f`).value;
        if(!i || !f) return;
        let diff = (new Date(`1970-01-01T${f}`) - new Date(`1970-01-01T${i}`)) / 60000;
        if(diff < 0) diff += 1440;
        document.getElementById(`r${n}`).innerText = `Tiempo: ${diff} min`;
        return diff;
    }

    // ENVÍO 1: Programador a Punzonador
    function env1() {
        const i = document.getElementById('i').value;
        const p = document.getElementById('p').value;
        if(!i || !p) return alert("Faltan datos");
        const url = `${getLinkLimpio()}?i=${encodeURIComponent(i)}&p=${encodeURIComponent(p)}`;
        window.open(`https://wa.me/?text=${encodeURIComponent('ILTEC OP: '+i+'\nLink: '+url)}`);
    }

    // ENVÍO 2: Punzonador a Plegador
    function env2() {
        const codParo = document.getElementById('pc1').value;
        const minParo = document.getElementById('pm1').value || 0;
        let textoParo = codParo !== "0" ? `\n⚠️ Paro: ${codParo} (${minParo} min)` : "";
        
        const url = `${getLinkLimpio()}?i=${params.get('i')}&p=${encodeURIComponent(params.get('p'))}&ok=1`;
        const msg = `✅ Punzonado OK: ${params.get('i')}\nOperario: ${document.getElementById('op2').value}${textoParo}\nSigue Plegado: ${url}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    // ENVÍO 3: Final a Base de Datos
    function env3() {
        const i = params.get('i');
        const h = new Date().toLocaleString();
        
        const codParo = document.getElementById('pc2').value;
        const minParo = document.getElementById('pm2').value || 0;
        let textoParo = codParo !== "0" ? `\n⚠️ Paro: ${codParo} (${minParo} min)` : "";

        const msg = `📊 REPORTE ILTEC FINAL\nItem: ${i}\nDoblador: ${document.getElementById('op3').value}${textoParo}\nTerminado: ${h}\n(Consultar tiempos de Punzonado en mensajes anteriores)`;
        window.open(`https://wa.me/573182150158?text=${encodeURIComponent(msg)}`);
        
        document.body.innerHTML = "<div class='contenedor' style='padding:40px; text-align:center'><h1>✔ Enviado</h1><p>Reporte finalizado con éxito.</p></div>";
    }
</script>
</body>
</html>
