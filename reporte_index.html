<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILTEC - Reporte de Producción</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --p: #2c3e50; --a: #27ae60; --b: #ecf0f1; --bo: #bdc3c7; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--b); margin: 0; padding: 10px; font-size: 11px; }
        .con { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .h { background: var(--p); color: white; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .h img { max-height: 35px; background: white; padding: 2px; border-radius: 4px; }
        .sec { padding: 15px; display: none; }
        .act { display: block; }
        h3 { border-bottom: 2px solid var(--a); color: var(--p); margin: 0 0 12px 0; font-size: 14px; padding-bottom: 4px; text-transform: uppercase;}
        .g { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; align-items: end; }
        .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; align-items: end; }
        .g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; margin-bottom: 8px; align-items: center; }
        label { font-weight: bold; font-size: 10px; display: block; margin-bottom: 2px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 6px; border: 1px solid var(--bo); border-radius: 4px; box-sizing: border-box; font-size: 11px; background: #fff; }
        .t-rep { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 10px; }
        .t-rep th { background: #eaeded; border: 1px solid var(--bo); padding: 5px; color: var(--p); }
        .t-rep td { border: 1px solid var(--bo); padding: 0; }
        .seccion-caja { background: #f8f9f9; padding: 10px; border-radius: 6px; border: 1px solid #e5e8e8; margin-bottom: 12px; }
        .titulo-caja { font-weight: bold; color: #16a085; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; }
        .i-it { display: grid; grid-template-columns: 1fr 90px; align-items: center; padding: 4px 0; border-bottom: 1px dashed #d5dbdb; }
        .ch { display: flex; gap: 10px; font-size: 10px; }
        .ch input { width: auto; margin: 0; }
        .p-ro { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 4px; margin-bottom: 4px; align-items: center; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; color: white; background: #27ae60; font-size: 13px; text-transform: uppercase; }
        .tot-t { font-weight: bold; color: #c0392b; font-size: 11px; text-align: right; }
        .info-top { background: #d4efdf; padding: 8px; border-radius: 4px; border: 1px solid #a9dfbf; margin-bottom: 15px; font-size: 12px; color: #1e8449; }
    </style>
</head>
<body>

<div class="con">
    <div class="h">
        <img src="https://wal-35.github.io/orden_produccion/logoiltec.png" alt="ILTEC">
        <strong>REPORTE ILTEC</strong>
    </div>

    <div class="sec act" id="p1">
        <h3>1. Programación</h3>
        <label>Item de la Pieza:</label>
        <input type="text" id="i_i" placeholder="Ej: 10811D">
        <label>Plano (GitHub):</label>
        <input type="url" id="i_p" placeholder="Pegue el link del PDF">
        <div class="g3">
            <div><label>Cantidad:</label><input type="number" id="i_c"></div>
            <div>
                <label>Material:</label>
                <select id="i_m">
                    <option value="CR (Cold Rolled)">CR (Cold Rolled)</option>
                    <option value="HR (Hot Rolled)">HR (Hot Rolled)</option>
                    <option value="GALV (Galvanizado)">GALV (Galvanizado)</option>
                    <option value="INOX (Acero Inoxidable)">INOX (Acero Inoxidable)</option>
                    <option value="ALUM (Aluminio)">ALUM (Aluminio)</option>
                </select>
            </div>
            <div><label>Calibre:</label><select id="i_ca"><option>12</option><option>14</option><option>16</option><option>18</option><option>20</option><option>22</option></select></div>
        </div>
        <button class="btn" onclick="envP1()">Enviar a Alistamiento <i class="material-icons">send</i></button>
    </div>

    <div class="sec" id="p2">
        <h3>2. Alistamiento</h3>
        <div id="inf2" class="info-top"></div>
        <div class="seccion-caja">
            <label>Joven Alistador:</label>
            <select id="al_op" class="s-op"></select>
            <label>Observaciones de Alistamiento:</label>
            <textarea id="al_o" rows="2" placeholder="Describa el estado de la herramienta..."></textarea>
        </div>
        <button class="btn" style="background:#2980b9;" onclick="envP2()">Enviar a Punzonado <i class="material-icons">forward</i></button>
    </div>

    <div class="sec" id="p3">
        <h3>3. Punzonado / Láser</h3>
        <div id="inf3" class="info-top"></div>
        <div class="seccion-caja">
            <div class="g">
                <div><label>Operario 1:</label><select id="pu_op1" class="s-op"></select></div>
                <div><label>Operario 2:</label><select id="pu_op2" class="s-op"></select></div>
            </div>
            <label>Máquina:</label><select id="pu_mq" class="s-mq-pu"></select>
            <div class="g4">
                <div><label>H. Inicio:</label><input type="time" id="pu_ti" onchange="calT('pu_ti', 'pu_tf', 'pu_tot')"></div>
                <div><label>H. Final:</label><input type="time" id="pu_tf" onchange="calT('pu_ti', 'pu_tf', 'pu_tot')"></div>
                <div id="pu_tot" style="grid-column: span 2;" class="tot-t">Tiempo: 0h 0m</div>
            </div>
        </div>

        <div class="seccion-caja">
            <div class="titulo-caja">Registro de Paros</div>
            <div class="p-ro"><label>Código</label><label>Ini</label><label>Fin</label><label>Tiempo</label></div>
            <div class="p-ro"><select id="pu_p1_c" class="s-mo"></select><input type="time" id="pu_p1_i" onchange="calT('pu_p1_i', 'pu_p1_f', 'pu_p1_t')"><input type="time" id="pu_p1_f" onchange="calT('pu_p1_i', 'pu_p1_f', 'pu_p1_t')"><div id="pu_p1_t">0h 0m</div></div>
            <div class="p-ro"><select id="pu_p2_c" class="s-mo"></select><input type="time" id="pu_p2_i" onchange="calT('pu_p2_i', 'pu_p2_f', 'pu_p2_t')"><input type="time" id="pu_p2_f" onchange="calT('pu_p2_i', 'pu_p2_f', 'pu_p2_t')"><div id="pu_p2_t">0h 0m</div></div>
            <div class="p-ro"><select id="pu_p3_c" class="s-mo"></select><input type="time" id="pu_p3_i" onchange="calT('pu_p3_i', 'pu_p3_f', 'pu_p3_t')"><input type="time" id="pu_p3_f" onchange="calT('pu_p3_i', 'pu_p3_f', 'pu_p3_t')"><div id="pu_p3_t">0h 0m</div></div>
        </div>

        <div class="seccion-caja" style="background:#ebf5fb; border-color:#3498db;">
            <div class="titulo-caja">Material y Calibre (Consumo)</div>
            <table class="t-rep"><thead><tr><th>Lám/Ret</th><th>Medidas</th><th>Sobras</th><th>Pzs</th></tr></thead><tbody id="f_pu"></tbody></table>
        </div>

        <div class="seccion-caja">
            <div class="g">
                <div><label>Conforme:</label><input type="number" id="pu_c"></div>
                <div><label>NC:</label><input type="number" id="pu_nc"></div>
            </div>
            <label>Defectos Punzonado:</label>
            <div class="g3"><select id="pu_dt" class="s-def-t"></select><select id="pu_dc" class="s-def-c"></select><select id="pu_da" class="s-def-a"></select></div>
            <div class="i-it"><span>Medidas OK?</span><div class="ch"><label><input type="radio" name="pu_qm" value="C"> C</label><label><input type="radio" name="pu_qm" value="NC"> NC</label></div></div>
        </div>
        <button class="btn" onclick="envP3()">Enviar a Plegado <i class="material-icons">forward</i></button>
    </div>

    <div class="sec" id="p4">
        <h3>4. Plegado</h3>
        <div id="inf4" class="info-top"></div>
        <div class="seccion-caja">
            <div class="g">
                <div><label>Operario 1:</label><select id="pl_op1" class="s-op"></select></div>
                <div><label>Operario 2:</label><select id="pl_op2" class="s-op"></select></div>
            </div>
            <label>Máquina:</label><select id="pl_mq" class="s-mq-pl"></select>
            <div class="g4">
                <div><label>H. Inicio:</label><input type="time" id="pl_ti" onchange="calT('pl_ti', 'pl_tf', 'pl_tot')"></div>
                <div><label>H. Final:</label><input type="time" id="pl_tf" onchange="calT('pl_ti', 'pl_tf', 'pl_tot')"></div>
                <div id="pl_tot" style="grid-column: span 2;" class="tot-t">Tiempo: 0h 0m</div>
            </div>
        </div>

        <div class="seccion-caja">
            <div class="g">
                <div><label>Conforme:</label><input type="number" id="pl_c"></div>
                <div><label>NC:</label><input type="number" id="pl_nc"></div>
            </div>
            <label>Defectos Plegado:</label>
            <div class="g3"><select id="pl_dt" class="s-def-t"></select><select id="pl_dc" class="s-def-c"></select><select id="pl_da" class="s-def-a"></select></div>
            <div class="i-it"><span>Medidas OK?</span><div class="ch"><label><input type="radio" name="pl_qm" value="C"> C</label><label><input type="radio" name="pl_qm" value="NC"> NC</label></div></div>
        </div>
        <label>Observaciones Finales:</label><textarea id="pl_o" rows="2"></textarea>
        <button class="btn" style="background:#e67e22;" onclick="envP4()">Finalizar Reporte y Enviar a DB <i class="material-icons">done_all</i></button>
    </div>
</div>

<script>
    const baseUrl = "https://wal-35.github.io/orden_produccion/reporte_index.html";
    const opcOps = `<option value="">Seleccione...</option><option>Alistador 1</option><option>Alistador 2</option><option>Juan Paz</option><option>Carlos Gomez</option><option>Andres Ruiz</option><option>Pedro Lopez</option>`;
    const opcMotivos = `<option value="">Cód...</option><option>01-Falla Eléc</option><option>02-Falla Mec</option><option>03-Falta Mat</option><option>04-Ajuste</option><option>05-Limpieza</option>`;
    const opcMqPu = `<option value="">Máquina...</option><option>Punzonadora 1</option><option>Punzonadora 2</option><option>Láser</option>`;
    const opcMqPl = `<option value="">Máquina...</option><option>Plegadora 1</option><option>Plegadora 2</option><option>Plegadora 3</option>`;
    const defTipos = `<option value="">Defecto...</option><option>Rebabas</option><option>Rayas/Golpes</option><option>Mal Doblez</option><option>Medida fuera</option>`;
    const defCausas = `<option value="">Causa...</option><option>Herramienta</option><option>Programación</option><option>Operario</option><option>Máquina</option>`;
    const defAcciones = `<option value="">Acción...</option><option>Corregir</option><option>Desechar</option><option>Ajustar</option><option>Repetir</option>`;

    function calT(idIni, idFin, idRes) {
        let ti = document.getElementById(idIni).value, tf = document.getElementById(idFin).value;
        if(ti && tf) {
            let d = (new Date(0,0,0,...tf.split(':'))) - (new Date(0,0,0,...ti.split(':')));
            if(d < 0) d += 86400000;
            let hh = Math.floor(d/3600000), mm = Math.floor((d%3600000)/60000);
            document.getElementById(idRes).innerText = `${hh}h ${mm}m`;
            return `${hh}h ${mm}m`;
        }
        return "0h 0m";
    }

    function getRadioVal(name) {
        let r = document.getElementsByName(name);
        for(let i=0; i<r.length; i++) if(r[i].checked) return r[i].value;
        return "N/A";
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        document.querySelectorAll('.s-op').forEach(s => s.innerHTML = opcOps);
        document.querySelectorAll('.s-mo').forEach(s => s.innerHTML = opcMotivos);
        document.querySelectorAll('.s-mq-pu').forEach(s => s.innerHTML = opcMqPu);
        document.querySelectorAll('.s-mq-pl').forEach(s => s.innerHTML = opcMqPl);
        document.querySelectorAll('.s-def-t').forEach(s => s.innerHTML = defTipos);
        document.querySelectorAll('.s-def-c').forEach(s => s.innerHTML = defCausas);
        document.querySelectorAll('.s-def-a').forEach(s => s.innerHTML = defAcciones);

        const tbPu = document.getElementById('f_pu');
        for (let i = 1; i <= 3; i++) {
            tbPu.innerHTML += `<tr><td><select id="pu_lr${i}"><option>Lám</option><option>Ret</option></select></td><td><input type="text" id="pu_md${i}"></td><td><input type="text" id="pu_ms${i}"></td><td><input type="number" id="pu_pz${i}"></td></tr>`;
        }

        let st = urlParams.get('s') || '1';
        if(st !== '1') {
            document.querySelectorAll('.sec').forEach(d => d.classList.remove('act'));
            document.getElementById('p'+st).classList.add('act');
            let info = `<b>Item:</b> ${urlParams.get('i')} | <b>Cant:</b> ${urlParams.get('c')} | <b>Mat:</b> ${urlParams.get('m')} | <b>Cal:</b> ${urlParams.get('ca')}<br><a href="${urlParams.get('p')}" target="_blank">📄 Ver Plano</a>`;
            if(document.getElementById('inf'+st)) document.getElementById('inf'+st).innerHTML = info;
        }
    };

    function envP1() {
        const i = document.getElementById('i_i').value, c = document.getElementById('i_c').value, p = document.getElementById('i_p').value, m = document.getElementById('i_m').value, ca = document.getElementById('i_ca').value;
        if(!i || !p) return alert("Falta Item o Plano");
        let link = `${baseUrl}?s=2&i=${encodeURIComponent(i)}&c=${c}&p=${encodeURIComponent(p)}&m=${encodeURIComponent(m)}&ca=${encodeURIComponent(ca)}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(`📋 *ORDEN:* ${i}\n*Cant:* ${c} | *Mat:* ${m}\n\n👉 *Abre aquí:* \n${link}`)}`);
    }

    function envP2() {
        const urlParams = new URLSearchParams(window.location.search);
        const i = urlParams.get('i'), c = urlParams.get('c'), ca = urlParams.get('ca'), p = urlParams.get('p'), m = urlParams.get('m');
        const al_op = document.getElementById('al_op').value, al_o = document.getElementById('al_o').value;
        
        let link = `${baseUrl}?s=3&i=${encodeURIComponent(i)}&c=${c}&ca=${encodeURIComponent(ca)}&p=${encodeURIComponent(p)}&m=${encodeURIComponent(m)}&al_op=${encodeURIComponent(al_op)}&al_o=${encodeURIComponent(al_o)}`;
        
        let msg = `🔧 *PUNZONADO:* ${i} | *Cant:* ${c}\n*Calibre:* ${ca} | *Alistó:* ${al_op}\n*Obs:* ${al_o}\n\n👉 *Operador, abre aquí:* \n${link}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function envP3() {
        const urlParams = new URLSearchParams(window.location.search);
        let params = new URLSearchParams(urlParams);
        params.set('s', '4');
        params.append('pu_op', `${document.getElementById('pu_op1').value} / ${document.getElementById('pu_op2').value}`);
        params.append('pu_mq', document.getElementById('pu_mq').value);
        params.append('pu_tt', document.getElementById('pu_tot').innerText);
        params.append('pu_c', document.getElementById('pu_c').value);
        params.append('pu_nc', document.getElementById('pu_nc').value);
        params.append('pu_qm', getRadioVal('pu_qm'));

        let paros = [];
        for(let j=1; j<=3; j++) {
            let cod = document.getElementById(`pu_p${j}_c`).value;
            if(cod) paros.push(`${cod}(${document.getElementById(`pu_p${j}_t`).innerText})`);
        }
        params.append('pu_pars', paros.join('|'));

        let mats = [];
        for(let k=1; k<=3; k++) {
            let lr = document.getElementById(`pu_lr${k}`).value, md = document.getElementById(`pu_md${k}`).value;
            if(md) mats.push(`${lr}:${md}:${document.getElementById(`pu_ms${k}`).value}:${document.getElementById(`pu_pz${k}`).value}`);
        }
        params.append('pu_mtb', mats.join('|'));

        let msg = `📐 *PLEGADO:* ${urlParams.get('i')} | *Cant:* ${urlParams.get('c')}\n*Material:* ${urlParams.get('m')} | *Cal:* ${urlParams.get('ca')}\n\n👉 *Operador, abre aquí:* \n${baseUrl}?${params.toString()}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function envP4() {
        const urlParams = new URLSearchParams(window.location.search);
        let matT = "\n📋 *MATERIAL (PUNZ):*\n";
        (urlParams.get('pu_mtb') || '').split('|').forEach(f => {
            if(f) { let [lr, md, s, p] = f.split(':'); matT += `- ${lr} ${md} | Sobra: ${s} | Pzs: ${p}\n`; }
        });

        const txt = `📊 *REPORTE FINAL*
*Item:* ${urlParams.get('i')} | *Cant:* ${urlParams.get('c')}
*Mat:* ${urlParams.get('m')} | *Cal:* ${urlParams.get('ca')}
➖➖➖➖➖➖
⚙️ *ALISTAMIENTO:* ${urlParams.get('al_op')}

🔨 *PUNZONADO:*
👤 *Op:* ${urlParams.get('pu_op')} | 🏭 ${urlParams.get('pu_mq')}
⏱️ ${urlParams.get('pu_tt')} | ✅ ${urlParams.get('pu_c')} | ❌ ${urlParams.get('pu_nc')}
🛑 *Paros:* ${urlParams.get('pu_pars') || 'N/A'}
${matT}

📐 *PLEGADO:*
👤 *Op:* ${document.getElementById('pl_op1').value}/${document.getElementById('pl_op2').value}
🏭 ${document.getElementById('pl_mq').value} | ⏱️ ${document.getElementById('pl_tot').innerText}
✅ ${document.getElementById('pl_c').value} | ❌ ${document.getElementById('pl_nc').value}
⚠️ *Defecto:* ${document.getElementById('pl_dt').value} | 🔍 Med: ${getRadioVal('pl_qm')}
📝 *Obs:* ${document.getElementById('pl_o').value}

🏁 *LISTO PARA DB*`;
        window.open(`https://wa.me/573182150158?text=${encodeURIComponent(txt)}`);
    }
</script>
</body>
</html>
